
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🚗 Controle de Veículos</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>🚗 Controle de Veículos</h1>
</header>

<div class="container">

<h2>Buscar</h2>
<input type="text" id="busca" placeholder="Digite a placa..." oninput="buscar()">

<h2>Cadastrar Veículo</h2>

<input id="placa" placeholder="Placa">
<input id="nome" placeholder="Proprietário">
<input id="modelo" placeholder="Modelo">

<button onclick="salvar()">Salvar Veículo</button>
<button onclick="limpar()">Limpar</button>

<h2>Veículos cadastrados</h2>

<div id="lista"></div>

</div>

<script type="module" src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
